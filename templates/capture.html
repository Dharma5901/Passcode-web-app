<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="capture_card">

        <h2 id="instruction"><b>START CAPTURE</b></h2>

        <div class="video-wrapper">
            <video id="video" autoplay playsinline muted></video>
            <div id="countdown" class="countdown"></div>
        </div>

        <div class="controls">
            <button id="startBtn" onclick="startCapture()">START CAPTURE</button>

            <div class="progress">
                <div id="bar" class="progress-bar"></div>
            </div>

            <button id="finishBtn" onclick="finish()">FINISH</button>
        </div>

        <p id="status"></p>

    </div>

    <script>
        window.addEventListener("load", function () {
            if (performance.getEntriesByType("navigation")[0]?.type === "reload") {
                window.location.href = "/";
            }
        });

        const video = document.getElementById("video");
        const instruction = document.getElementById("instruction");
        const countdown = document.getElementById("countdown");
        const progressBar = document.getElementById("bar");
        const finishBtn = document.getElementById("finishBtn");
        const statusText = document.getElementById("status");

        let interval = null;
        let capturing = false;
        let lastSpoken = "";

        function speak(text) {
            if (lastSpoken === text) return;

            lastSpoken = text;
            speechSynthesis.cancel();

            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.9;
            msg.pitch = 1;
            msg.volume = 1;

            speechSynthesis.speak(msg);
        }

        // async function initCamera() {
        //     try {
        //         const stream = await navigator.mediaDevices.getUserMedia({
        //             video: {
        //                 facingMode: "user",
        //                 width: { ideal: 640 },
        //                 height: { ideal: 480 },
        //                 aspectRatio: 0.75
        //             },
        //             audio: false
        //         });

        //         video.srcObject = stream;
        //         video.setAttribute("playsinline", true);

        //         await video.play();

        //     } catch (err) {
        //         console.error("Camera Error:", err);
        //         alert("Camera access denied or not supported on this device.");
        //     }
        // }

        async function initCamera() {
    try {
        const isMobile =
            /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|Mobile/i.test(
                navigator.userAgent
            );

        let constraints;

        if (isMobile) {
            constraints = {
                video: {
                    facingMode: { ideal: "user" }
                },
                audio: false
            };
        } else {
            constraints = {
                video: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    facingMode: "user"
                },
                audio: false
            };
        }

        const stream = await navigator.mediaDevices.getUserMedia(constraints);

        video.srcObject = stream;

        video.onloadedmetadata = async () => {
            try {
                await video.play();
            } catch (e) {
                console.error("Play failed:", e);
            }
        };

    } catch (err) {
        console.error("Camera Error:", err);
        alert("Camera access failed: " + err.message);
    }
}

        initCamera();

        function startCapture() {
            if (interval) return;

            instruction.innerText = "🙂 LOOK STRAIGHT";
            speak("Look straight");

            video.classList.add("video-active");

            interval = setInterval(loop, 1200);
        }

        function loop() {
            if (capturing) return;

            capturing = true;

            runCountdown(() => {
                sendFrame();
            });
        }

        function runCountdown(callback) {
            countdown.style.display = "block";
            countdown.innerText = "1";

            setTimeout(() => {
                countdown.innerText = "📸";

                setTimeout(() => {
                    countdown.style.display = "none";
                    callback();
                }, 250);

            }, 800);
        }

        function sendFrame() {
            const canvas = document.createElement("canvas");

            const vw = video.videoWidth || 720;
            const vh = video.videoHeight || 1280;

            canvas.width = vw;
            canvas.height = vh;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, vw, vh);

            fetch("/process_frame", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    passcode: "{{passcode}}",
                    emp_id: "{{emp_id}}",
                    image: canvas.toDataURL("image/jpeg", 0.9)
                })
            })
                .then(res => res.json())
                .then(data => {
                    capturing = false;

                    if (data.status === "error") {
                        instruction.innerText = "❌ SERVER ERROR";
                        return;
                    }

                    if (data.status === "no_face") {
                        instruction.innerText = "😐 FACE NOT DETECTED";
                        speak("Face not detected");
                        return;
                    }

                    if (data.phase === "frontal") {
                        instruction.innerText = "🙂 LOOK STRAIGHT";
                        speak("Look straight");
                    }

                    if (data.phase === "left") {
                        instruction.innerText = "👈 TURN LEFT";
                        speak("Look left");
                    }

                    if (data.phase === "right") {
                        instruction.innerText = "👉 TURN RIGHT";
                        speak("Look right");
                    }

                    const percent = (data.total / 20) * 100;
                    progressBar.style.width = percent + "%";

                    if (data.done) {
                        clearInterval(interval);
                        interval = null;

                        video.classList.remove("video-active");

                        instruction.innerText = "✅ CAPTURE COMPLETED";
                        statusText.innerText = "✅ CAPTURE COMPLETED";

                        finishBtn.style.display = "block";

                        speak("Capture completed");

                        if (video.srcObject) {
                            video.srcObject.getTracks().forEach(track => track.stop());
                        }
                    }
                })
                .catch(err => {
                    capturing = false;
                    console.error(err);
                    instruction.innerText = "❌ REQUEST FAILED";
                });
        }

        function finish() {
            speechSynthesis.cancel();
            window.location.href = "/success";
        }
    </script>

</body>

</html>
